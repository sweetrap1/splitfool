<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Navy background -->
  <rect width="32" height="32" rx="7" fill="#111827"/>
  <!-- Stem -->
  <line x1="16" y1="26" x2="16" y2="17" stroke="url(#iconGrad)" stroke-width="2.4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Left arm -->
  <line x1="16" y1="20" x2="8"  y2="11" stroke="url(#iconGrad)" stroke-width="2.4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right arm -->
  <line x1="16" y1="20" x2="24" y2="11" stroke="url(#iconGrad)" stroke-width="2.4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Left arrowhead -->
  <polyline points="5,13 8,11 10,15"  fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Right arrowhead -->
  <polyline points="27,13 24,11 22,15" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Up arrowhead -->
  <polyline points="13,17 16,12 19,17" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
